services:
  - type: web
    name: djadwal
    env: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm run start:api
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=350"
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
